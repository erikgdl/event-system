server:
  port: 8080

spring:
  application:
    name: sistema-evento

  datasource:
    url: jdbc:mysql://localhost:3306/sistema-evento?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true